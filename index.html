<h1>未習漢字チェッカー（自動読み提案＋文脈表示）</h1>

            <option value="8">中学2年生</option>
            <option value="9">中学3年生</option>
        </select>
        <div id="jhsNote" class="jhs-note">
            ※中学校の漢字は国による学年別配当の指定がないため、一般的な目安で1〜3年に分割しています。
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="includeCurrent" checked>
            <label for="includeCurrent" style="display:inline; font-weight:normal;">選択した学年で習う漢字も「学習済み」に含める</label>
        </div>

        <label for="whitelist">ホワイトリスト（除外する漢字・単語）</label>
        <textarea id="whitelist" placeholder="例：山田太郎、学校名など。ここに入力された文字に含まれる漢字は、未習であってもハイライトされません。"></textarea>

        <label for="inputText">チェックする文章</label>
        <textarea id="inputText" placeholder="ここに文章を入力してください。"></textarea>

        <button id="checkBtn" class="primary-btn" onclick="analyzeText()" disabled>辞書データを読み込み中...</button>
    </div>

    <div class="panel">
        <button id="batchBtn" class="batch-btn" onclick="openBatchModal()">リストを確認して一括ひらがな変換</button>
        <label>チェック結果</label>
        <div id="resultBox" class="result-box">左の「チェック実行」を押すと結果が表示されます。</div>
    </div>
</div>

<div id="modalOverlay">
    <div class="modal-content">
        <h3>一括ひらがな変換リスト</h3>
        <p>AIが推測したひらがなを確認・修正してください。<strong>空欄のままにした項目は、変換されず漢字のまま残ります。</strong></p>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 50%;">対象の文字（前後文脈）</th>
                        <th style="width: 50%;">変換候補（手動修正可）</th>
                    </tr>
                </thead>
                <tbody id="batchTableBody">
                    </tbody>
            </table>
        </div>
        <div class="modal-buttons">
            <button class="btn-exec" onclick="executeBatchReplace()">チェック完了（一括で本文を書き換える）</button>
            <button class="btn-cancel" onclick="closeBatchModal()">キャンセル</button>
        </div>
    </div>
</div>

<div id="tooltip">

    </h4>
    <input type="text" id="replacementText" placeholder="ひらがなを入力">
    <div class="tooltip-buttons">
        <button class="btn-exec" onclick="replaceSingleKanji()">置換</button>
        <button class="btn-cancel" onclick="closeTooltip()">中止</button>
    </div>
</div>

<script>
    // --- kuromoji.jsの初期化と辞書読み込み ---
    let tokenizer = null;

    window.onload = function() {
        const checkBtn = document.getElementById('checkBtn');
        kuromoji.builder({ dicPath: "https://cdn.jsdelivr.net/npm/kuromoji@0.1.2/dict" }).build(function (err, _tokenizer) {
            if (err) {
                console.error("辞書の読み込みに失敗しました:", err);
                checkBtn.innerText = "辞書読み込みエラー（再読み込みしてください）";
                return;
            }
            tokenizer = _tokenizer;
            checkBtn.innerText = "チェック実行";
            checkBtn.disabled = false;
        });
    };

    function kanaToHira(str) {
        return str.replace(/[\u30a1-\u30f6]/g, function(match) {
            var chr = match.charCodeAt(0) - 0x60;
            return String.fromCharCode(chr);
        });
    }

    function getReadingSuggestion(text) {
        if (!tokenizer) return ""; 
        const tokens = tokenizer.tokenize(text);
        let readingKatakana = "";
        tokens.forEach(token => {
            readingKatakana += token.reading ? token.reading : token.surface_form;
        });
        return kanaToHira(readingKatakana);
    }

    function getContext(text, startIdx, endIdx) {
        let before = text.substring(Math.max(0, startIdx - 2), startIdx).replace(/\n/g, ' ');
        let after = text.substring(endIdx, Math.min(text.length, endIdx + 2)).replace(/\n/g, ' ');
        return { before, after };
    }

    // --- メイン解析処理 ---
    function analyzeText() {
        const targetGrade = parseInt(document.getElementById('grade').value);
        const includeCurrent = document.getElementById('includeCurrent').checked;
        const whitelistText = document.getElementById('whitelist').value;
        const inputText = document.getElementById('inputText').value;

        let learnedKanji = "";
        let maxLearnedGrade = includeCurrent ? targetGrade : targetGrade - 1;
        for (let i = 1; i <= maxLearnedGrade; i++) {
            if (kanjiData[i]) learnedKanji += kanjiData[i];
        }

        const whitelistMatches = whitelistText.match(/[\u4E00-\u9FAF]/g);
        if (whitelistMatches) {
            learnedKanji += whitelistMatches.join('');
        }

        const resultBox = document.getElementById('resultBox');
        let highlightedHTML = "";
        let currentWord = "";
        let currentStartIdx = 0;
        
        unlearnedWordList = [];

        for (let i = 0; i < inputText.length; i++) {
            let char = inputText[i];
            
            if (/[\u4E00-\u9FAF]/.test(char) && !learnedKanji.includes(char)) {
                if (currentWord === "") currentStartIdx = i;
                currentWord += char;
            } else {
                if (currentWord !== "") {
                    let id = unlearnedWordList.length;
                    let suggestion = getReadingSuggestion(currentWord);
                    let ctx = getContext(inputText, currentStartIdx, i);
                    
                    unlearnedWordList.push({ 
                        id: id, original: currentWord, suggestion: suggestion, 
                        start: currentStartIdx, end: i,
                        contextBefore: ctx.before, contextAfter: ctx.after
                    });
                    highlightedHTML += `<span class="unlearned" id="unlearned-${id}" onclick="openTooltip(this, ${id}, event)">${currentWord}</span>`;
                    currentWord = "";
                }
                
                if (char === '\n') {
                    highlightedHTML += '<br>';
                } else {
                    char = char.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    highlightedHTML += char;
                }
            }
        }
        
        if (currentWord !== "") {
            let id = unlearnedWordList.length;
            let suggestion = getReadingSuggestion(currentWord);
            let ctx = getContext(inputText, currentStartIdx, inputText.length);

            unlearnedWordList.push({ 
                id: id, original: currentWord, suggestion: suggestion, 
                start: currentStartIdx, end: inputText.length,
                contextBefore: ctx.before, contextAfter: ctx.after
            });
            highlightedHTML += `<span class="unlearned" id="unlearned-${id}" onclick="openTooltip(this, ${id}, event)">${currentWord}</span>`;
        }

        resultBox.innerHTML = highlightedHTML || "結果がここに表示されます。";
        
        const batchBtn = document.getElementById('batchBtn');
        if (unlearnedWordList.length > 0) {
            batchBtn.style.display = 'inline-block';
            batchBtn.innerText = `リストを確認して一括ひらがな変換（対象：${unlearnedWordList.length}箇所）`;
        } else {
            batchBtn.style.display = 'none';
        }
    }

    // --- 一括変換モーダルの処理 ---
    const modalOverlay = document.getElementById('modalOverlay');
    const batchTableBody = document.getElementById('batchTableBody');

    function openBatchModal() {
        batchTableBody.innerHTML = ""; 
        
        unlearnedWordList.forEach(item => {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>
                    <span class="context-text">${item.contextBefore}</span>
                    <strong class="target-text">${item.original}</strong>
                    <span class="context-text">${item.contextAfter}</span>
                </td>
                <td>
                    <input type="text" id="batch-input-${item.id}" value="${item.suggestion}" placeholder="修正したいひらがなを入力">
                </td>
            `;
            batchTableBody.appendChild(tr);
        });

        modalOverlay.style.display = 'flex';
    }

    function closeBatchModal() {
        modalOverlay.style.display = 'none';
    }

    function executeBatchReplace() {
        let text = document.getElementById('inputText').value;
        let sortedList = [...unlearnedWordList].sort((a, b) => b.start - a.start);
        
        sortedList.forEach(item => {
            let inputEl = document.getElementById(`batch-input-${item.id}`);
            if (inputEl) {
                let newValue = inputEl.value.trim();
                if (newValue !== "") {
                    text = text.substring(0, item.start) + newValue + text.substring(item.end);
                }
            }
        });

        document.getElementById('inputText').value = text;
        closeBatchModal();
        analyzeText();
    }

    // --- 個別ポップアップの処理 ---
    const tooltip = document.getElementById('tooltip');
    const targetKanjiSpan = document.getElementById('targetKanji');
    const contextBeforeSpan = document.getElementById('contextBefore');
    const contextAfterSpan = document.getElementById('contextAfter');
    const replacementInput = document.getElementById('replacementText');

    function openTooltip(spanElement, id, event) {
        currentEditingId = id;
        const item = unlearnedWordList.find(w => w.id === id);
        if(!item) return;

        contextBeforeSpan.textContent = item.contextBefore;
        targetKanjiSpan.textContent = item.original;
        contextAfterSpan.textContent = item.contextAfter;
        replacementInput.value = item.suggestion || "";

        const rect = spanElement.getBoundingClientRect();
        tooltip.style.left = (rect.left + window.scrollX) + 'px';
        tooltip.style.top = (rect.bottom + window.scrollY + 8) + 'px';
        tooltip.style.display = 'block';
        
        replacementInput.focus();
        event.stopPropagation();
    }

    function closeTooltip() {
        tooltip.style.display = 'none';
        currentEditingId = null;
    }

    function replaceSingleKanji() {
        if (currentEditingId === null) return;
        
        const newValue = replacementInput.value.trim();
        if (newValue !== "") {
            const item = unlearnedWordList.find(w => w.id === currentEditingId);
            let text = document.getElementById('inputText').value;
            text = text.substring(0, item.start) + newValue + text.substring(item.end);
            
            document.getElementById('inputText').value = text;
            analyzeText();
        }
        closeTooltip();
    }

    document.addEventListener('click', function(event) {
        if (tooltip.style.display === 'block' && !tooltip.contains(event.target) && !event.target.classList.contains('unlearned')) {
            closeTooltip();
        }
    });

    replacementInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            replaceSingleKanji();
            e.preventDefault();
        }
    });
</script>
